<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>回れ回れ</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">
        <!-- 上部のステータスバーです -->
        <header id="status-bar">
            <div class="status-item">
                <span class="status-label">総回転数</span>
                <strong id="counter-value">0</strong>
            </div>
            <div class="status-item">
                <span class="status-label">レベル</span>
                <strong id="level-value">1</strong>
            </div>
        </header>

        <main id="game-screen">
            <section id="stage-area">
                <div id="kanji-stage">
                    <div id="effect-layer" aria-hidden="true"></div>
                    <div id="kanji">回</div>
                </div>
            </section>

            <section id="progress-panel" aria-label="進行状況">
                <div class="panel-head">
                    <h2>解放ゲージ</h2>
                    <span id="progress-text">0 / 10</span>
                </div>
                <div id="progress-track" aria-hidden="true">
                    <div id="progress-fill"></div>
                </div>

                <div class="panel-head unlock-head">
                    <h2>実績バッジ</h2>
                </div>
                <div id="badge-list" aria-label="実績バッジ一覧"></div>
            </section>
        </main>

        <footer id="control-bar">
            <button id="auto-rotate-button" type="button" aria-pressed="false" hidden>自動回転: オフ</button>
            <button id="reset-data-button" type="button">データリセット</button>
        </footer>
    </div>

    <div id="unlock-toast" role="status" aria-live="polite" hidden></div>
    <div id="level-up-overlay" aria-hidden="true" hidden>
        <span class="level-up-title">LEVEL UP!</span>
        <span id="level-up-value">Lv.1</span>
    </div>
    <script src="script.js"></script>
</body>

</html>
